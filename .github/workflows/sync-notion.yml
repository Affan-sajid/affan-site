name: Sync Notion to Firebase

on:
  workflow_dispatch: # manual trigger + API/webhook trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Notion → Firebase sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIRESTORE_COLLECTION: ${{ secrets.FIRESTORE_COLLECTION }}
          NOTION_SHOW_PROPERTY: ${{ secrets.NOTION_SHOW_PROPERTY }}
          NOTION_DOC_ID_PROPERTY: ${{ secrets.NOTION_DOC_ID_PROPERTY }}
        run: node sync-firebase.js
